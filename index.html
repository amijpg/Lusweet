<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lusweet | Dulcería</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF3EC;
    --rose:#E8B4B8;
    --rose-deep:#C97F86;
    --plum:#4A2E35;
    --gold:#C7952F;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(circle at 20% 15%, rgba(232,180,184,0.35), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(199,149,47,0.18), transparent 40%),
      var(--cream);
    font-family:'Jost', sans-serif;
    color:var(--plum);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .card{
    width:100%;
    max-width:420px;
    background:#fffaf5;
    border-radius:28px;
    padding:48px 32px 40px;
    text-align:center;
    box-shadow:0 30px 60px -20px rgba(74,46,53,0.25);
    position:relative;
    overflow:hidden;
  }

  .card::before{
    content:"";
    position:absolute;
    top:-60px;
    left:50%;
    transform:translateX(-50%);
    width:220px;
    height:220px;
    background:radial-gradient(circle, rgba(232,180,184,0.5), transparent 70%);
    z-index:0;
  }

  .seal{
    position:relative;
    z-index:1;
    width:84px;
    height:84px;
    margin:0 auto 18px;
    border-radius:50%;
    background:linear-gradient(160deg, var(--rose-deep), var(--rose));
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 8px 20px -6px rgba(201,127,134,0.6);
  }

  .seal span{
    font-family:'Cormorant Garamond', serif;
    font-size:38px;
    font-weight:700;
    color:#fffaf5;
    letter-spacing:1px;
  }

  h1{
    position:relative;
    z-index:1;
    font-family:'Cormorant Garamond', serif;
    font-weight:700;
    font-size:44px;
    letter-spacing:2px;
    color:var(--plum);
  }

  .tagline{
    position:relative;
    z-index:1;
    font-size:13px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--rose-deep);
    margin-top:6px;
    margin-bottom:34px;
  }

  .divider{
    width:60px;
    height:1px;
    background:var(--gold);
    margin:0 auto 34px;
    opacity:.6;
  }

  .links{
    display:flex;
    flex-direction:column;
    gap:14px;
    position:relative;
    z-index:1;
  }

  .btn{
    display:flex;
    align-items:center;
    gap:14px;
    text-decoration:none;
    padding:16px 20px;
    border-radius:16px;
    font-size:15px;
    font-weight:500;
    letter-spacing:.3px;
    transition:transform .15s ease, box-shadow .15s ease;
  }

  .btn:hover{ transform:translateY(-2px); }
  .btn:active{ transform:translateY(0); }

  .btn .icon{
    width:38px;
    height:38px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }

  .btn .label{ text-align:left; }
  .btn .label small{
    display:block;
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
    opacity:.65;
    margin-bottom:2px;
  }

  .btn-whatsapp{
    background:#EAF6EE;
    color:#1F5C3A;
    box-shadow:0 6px 16px -8px rgba(37,120,71,0.35);
  }
  .btn-whatsapp .icon{ background:#25D366; }

  .btn-instagram{
    background:#FBEDF3;
    color:#8A2A57;
    box-shadow:0 6px 16px -8px rgba(188,41,110,0.35);
  }
  .btn-instagram .icon{
    background:linear-gradient(135deg,#F58529,#DD2A7B,#8134AF,#515BD4);
  }

  .icon svg{ width:19px; height:19px; display:block; }

  footer{
    position:relative;
    z-index:1;
    margin-top:32px;
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--rose-deep);
    opacity:.7;
  }
</style>
</head>
